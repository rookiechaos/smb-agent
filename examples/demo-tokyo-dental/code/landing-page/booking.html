<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予約 — {{CLINIC_NAME}}</title>
  <link rel="stylesheet" href="/index.css">
  <style>
    body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", sans-serif;
           margin: 0; color: #1b3a4b; line-height: 1.6; }
    .wrap { max-width: 560px; margin: 3rem auto; padding: 0 1.5rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .lead { opacity: 0.8; margin-bottom: 2rem; }
    form { display: grid; gap: 1rem; }
    label { display: grid; gap: 0.3rem; font-weight: 600; }
    input, textarea, select {
      font-family: inherit; font-size: 1rem; padding: 0.6rem;
      border: 1px solid #c5d8e0; border-radius: 4px; width: 100%;
    }
    textarea { min-height: 6rem; }
    button { padding: 0.8rem; background: #2c8aa0; color: white; border: none;
             border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>ご予約</h1>
    <p class="lead">空き状況を確認の上、お電話でご連絡します。</p>

    <form action="/api/book" method="POST">
      <label>お名前
        <input name="name" required>
      </label>
      <label>お電話番号
        <input name="phone" type="tel" required>
      </label>
      <label>ご来院の目的
        <select name="purpose">
          <option>定期検診・クリーニング</option>
          <option>虫歯の治療</option>
          <option>痛み・違和感</option>
          <option>その他</option>
        </select>
      </label>
      <label>ご希望日時
        <input name="preferred" placeholder="例: 来週の平日午前">
      </label>
      <label>備考
        <textarea name="notes"></textarea>
      </label>
      <button type="submit">送信する</button>
    </form>
  </main>
</body>
</html>
